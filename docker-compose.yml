services:
  postgres:
    image: postgres:16
    container_name: abandono_escolar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: abandono_escolar_db
      POSTGRES_USER: abandono_user
      POSTGRES_PASSWORD: abandono_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abandono_user -d abandono_escolar_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
